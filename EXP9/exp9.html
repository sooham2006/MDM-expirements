<!DOCTYPE html>
<html>

<head>
    <title>API Search Filter</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        input {
            width: 300px;
            padding: 10px;
            margin: 20px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px auto;
            width: 60%;
            border-radius: 5px;
            text-align: left;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <h2>Search API Data</h2>

    <input type="text" id="search" placeholder="Search by title...">

    <div id="results"></div>

    <script>
        let apiData = [];

        // 1. Fetch API data
        fetch("https://jsonplaceholder.typicode.com/posts")
            .then(response => response.json())
            .then(data => {
                apiData = data;
                displayData(apiData);
            });

        // 2. Display function
        function displayData(data) {
            const resultDiv = document.getElementById("results");
            resultDiv.innerHTML = "";

            data.forEach(item => {
                resultDiv.innerHTML += `
            <div class="card">
                <h4>${item.title}</h4>
                <p>${item.body}</p>
            </div>
        `;
            });
        }

        // 3. Search functionality (live filtering)
        document.getElementById("search").addEventListener("keyup", function () {
            const keyword = this.value.toLowerCase();

            const filteredData = apiData.filter(item =>
                item.title.toLowerCase().includes(keyword)
            );

            displayData(filteredData);
        });
    </script>

</body>

</html>
